<!DOCTYPE html>
<html>
<head>
    <title>Anime Walls Admin</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .card { background: white; padding: 20px; border-radius: 8px; width: 200px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        .stat { font-size: 24px; font-weight: bold; color: #ff4757; }
    </style>
</head>
<body>
    <h1>Admin Dashboard</h1>
    <div id="stats" class="card-container">
        <div class="card"><h3>Total Walls</h3><p id="total" class="stat">0</p></div>
        <div class="card"><h3>Static</h3><p id="static" class="stat">0</p></div>
        <div class="card"><h3>Live</h3><p id="live" class="stat">0</p></div>
        <div class="card"><h3>Total Love</h3><p id="love" class="stat">0</p></div>
        <div class="card"><h3>Total Share</h3><p id="share" class="stat">0</p></div>
    </div>

    <script>
        fetch('http://localhost:5000/api/admin/stats')
            .then(res => res.json())
            .then(data => {
                document.getElementById('total').innerText = data.totalWallpapers;
                document.getElementById('static').innerText = data.staticCount;
                document.getElementById('live').innerText = data.liveCount;
                document.getElementById('love').innerText = data.totalLove;
                document.getElementById('share').innerText = data.totalShare;
            });
    </script>
</body>
</html>
